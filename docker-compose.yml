services:
  api:
    build:
      context: ./services/api
    environment:
      APP_NAME: reliabilityops-api
      DB_DSN: postgresql://postgres:postgres@postgres:5432/reliabilityops
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/reliabilityops
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TASK_QUEUE: tasks
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  worker:
    build:
      context: ./services/worker
    environment:
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      QUEUE_NAME: tasks
      DLQ_NAME: tasks.dlq
      MAX_RETRIES: 3
      FAIL_RATE: 0.0
    depends_on:
      - redis
      - rabbitmq

  remediator:
    build:
      context: ./services/remediator
    environment:
      APP_NAME: reliabilityops-remediator
    ports:
      - "8002:8002"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reliabilityops
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  prometheus:
    image: prom/prometheus:v2.53.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pg_data: